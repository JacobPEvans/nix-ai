repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
        files: \.md$
        # CHANGELOG.md is auto-generated by release-please; its commit-hash URLs produce
        # unavoidable MD013 violations and its per-release section headings trigger MD024.
        exclude: ^CHANGELOG\.md$

  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v9.6.0
    hooks:
      - id: cspell
        name: Check spelling
        additional_dependencies:
          - "@cspell/dict-aws@4.0.17"
          - "@cspell/dict-bash@4.2.2"
          - "@cspell/dict-companies@3.2.11"
          - "@cspell/dict-data-science@2.0.13"
          - "@cspell/dict-docker@1.1.17"
          - "@cspell/dict-filetypes@3.0.18"
          - "@cspell/dict-git@3.1.0"
          - "@cspell/dict-html@4.0.15"
          - "@cspell/dict-k8s@1.0.12"
          - "@cspell/dict-markdown@2.0.16"
          - "@cspell/dict-node@5.0.9"
          - "@cspell/dict-npm@5.2.38"
          - "@cspell/dict-python@4.2.26"
          - "@cspell/dict-shell@1.1.2"
          - "@cspell/dict-software-terms@5.2.2"
          - "@cspell/dict-terraform@1.1.3"
          - "@cspell/dict-typescript@3.2.3"

  - repo: local
    hooks:
      - id: nix-fmt-check
        name: Nix formatting (nixfmt-rfc-style)
        entry: "bash -c 'nixfmt --check \"$@\" || (echo \"Run: nix fmt\"; exit 1)' --"
        language: system
        files: \.nix$
        types: [file]

      - id: nix-statix
        name: Nix linting (statix)
        entry: statix check
        language: system
        files: \.nix$
        types: [file]
        pass_filenames: false

      - id: nix-deadnix
        name: Nix dead code (deadnix)
        entry: deadnix -L --fail
        language: system
        files: \.nix$
        types: [file]
        pass_filenames: false

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.22.0
    hooks:
      - id: zizmor
        args: ['--persona=regular', '--min-severity=medium', '--min-confidence=medium']
