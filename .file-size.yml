# File size limits (read by pre-commit + GH Actions)
#
# Tiers: warn (5KB), error (10KB), extended (20KB)

defaults:
  warn: 5120      # 5 KB
  error: 10240    # 10 KB

extended:
  warn: 10240     # 10 KB
  error: 20480    # 20 KB
  files:
    - CHANGELOG.md
    - README.md

exempt:
  - "*.lock"
  - "package-lock.json"
  - "pnpm-lock.yaml"

scan:
  - .nix
  - .md
  - .sh
  - .yml
  - .yaml
