name: Next Steps
on:
  schedule:
    - cron: "0 5 * * 1,4"
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: next-steps
  cancel-in-progress: true

jobs:
  next-steps:
    uses: JacobPEvans/ai-workflows/.github/workflows/next-steps.yml@a5620445cea6a3f94143755a5a4bdea4e530c39d # v0.8.0
    secrets: inherit # zizmor: ignore[secrets-inherit]
