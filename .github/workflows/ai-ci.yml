name: AI CI

on:
  workflow_dispatch:
  # STATUS: Disabled — automatic triggers replaced by workflow_dispatch-only until ai-workflows stabilizes
  # --- DISABLED AUTOMATIC TRIGGERS (restore by uncommenting) ---
  # workflow_run:
  #   workflows: ["CI Gate"]
  #   types: [completed]
  # --- END DISABLED ---

permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write

# STATUS: Disabled — concurrency group depends on workflow_run context which is unavailable in dispatch-only mode
# --- DISABLED AUTOMATIC TRIGGERS (restore by uncommenting) ---
# concurrency:
#   group: ai-ci-${{ github.event.workflow_run.head_branch }}
#   cancel-in-progress: true
# --- END DISABLED ---

jobs:
  ci-suite:
    uses: JacobPEvans/ai-workflows/.github/workflows/suite-ci.yml@v0
    with:
      repo_context: "Nix home-manager modules for AI CLI tools (Claude, Gemini, Copilot, MCP servers)"
      ci_structure: "ci-gate.yml (dorny/paths-filter + nix-check + markdown-lint + alls-green gate)"
      workflow_name: "CI Gate"
      extra_tools: "Bash(nix *)"
    secrets: inherit
