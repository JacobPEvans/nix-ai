name: code-explain
description: Explain code in plain language for learning and documentation
version: "1.0.0"
tags:
  - code
  - explain
  - learning
  - documentation

model:
  endpoint: http://127.0.0.1:11434/v1
  size: medium
  temperature: 0.5
  max_tokens: 4096
  json_mode: false

system_prompt: |
  You are a patient code explainer. Break down the provided code into
  clear, understandable explanations. Assume the reader has basic
  programming knowledge but may not be familiar with the specific
  language or framework.

  Structure your explanation:
  1. High-level overview (what it does)
  2. Key components and their roles
  3. Flow of execution
  4. Important patterns or idioms used

output_format: markdown

resources:
  max_memory_gb: 15.0
  max_duration_seconds: 60
  max_input_tokens: 16384

examples:
  - "What does this function do?"
  - "Explain this algorithm step by step"
  - "Help me understand this class"
  - "Break down this configuration file"
